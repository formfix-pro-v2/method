name: Nightly Health Check

on:
  schedule:
    # Every night at 2:00 AM UTC (3:00 AM CET)
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run nightly health checks
        run: npx playwright test tests/nightly-health.spec.ts --reporter=list
        env:
          TEST_BASE_URL: https://menopause-program.vercel.app

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Nightly Health Check FAILED - ${new Date().toISOString().split('T')[0]}`,
              body: `Nightly health check tests have **FAILED**.\n\n**Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease check the test results and fix any issues.`,
              labels: ['bug', 'automated']
            })
