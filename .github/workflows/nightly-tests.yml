name: Nightly Health Check

on:
  schedule:
    # Every night at 2:00 AM UTC (3:00 AM CET)
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run nightly health checks
        run: npx playwright test tests/nightly-health.spec.ts --reporter=list
        env:
          TEST_BASE_URL: https://menopause-program.vercel.app

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "⚠️ Veronica Method - Nightly Tests FAILED"
          body: |
            Nightly health check tests have FAILED for menopause-program.vercel.app.
            
            Time: ${{ github.event.repository.updated_at }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Please check the test results and fix any issues.
          to: majavujovicns021@gmail.com
          from: Veronica Method Bot <noreply@veronicamethod.com>
